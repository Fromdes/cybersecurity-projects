[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-96-behavioral-auth"
version = "0.1.0"
description = "Behavioral Authentication PoC — keystroke dynamics profiling and verification"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
behavioral-auth = "project_96.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_96"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104","S311"]
