[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-84-secrets-scanner"
version = "0.1.0"
description = "Secrets Scanner — detect hardcoded credentials and API keys in source code"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
secrets-scanner = "project_84.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_84"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
