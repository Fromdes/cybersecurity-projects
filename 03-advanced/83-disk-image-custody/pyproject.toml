[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-83-disk-image-custody"
version = "0.1.0"
description = "Disk Image Hash & Chain-of-Custody — forensic hashing and custody management"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
disk-custody = "project_83.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_83"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104","S324"]
