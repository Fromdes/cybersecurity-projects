[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-86-sbom-generator"
version = "0.1.0"
description = "SBOM Generator — CycloneDX and SPDX Software Bill of Materials"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
sbom-generator = "project_86.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_86"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
