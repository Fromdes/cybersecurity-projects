[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-85-dependency-vuln-checker"
version = "0.1.0"
description = "Dependency Vulnerability Checker — query OSV.dev for CVEs in dependencies"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
dep-vuln-checker = "project_85.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_85"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104","S310"]
