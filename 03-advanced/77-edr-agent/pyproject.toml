[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-77-edr-agent"
version = "0.1.0"
description = "Lightweight EDR Agent — endpoint process/network anomaly detection"
requires-python = ">=3.11"
dependencies = ["click>=8.1", "psutil>=5.9"]

[project.scripts]
edr-agent = "project_77.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_77"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104","S603"]
