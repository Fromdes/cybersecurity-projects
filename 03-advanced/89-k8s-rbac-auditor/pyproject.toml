[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-89-k8s-rbac-auditor"
version = "0.1.0"
description = "Kubernetes RBAC Auditor — detect privilege escalation in Role/ClusterRole YAML"
requires-python = ">=3.11"
dependencies = ["click>=8.1", "pyyaml>=6.0"]

[project.scripts]
k8s-rbac-auditor = "project_89.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_89"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
