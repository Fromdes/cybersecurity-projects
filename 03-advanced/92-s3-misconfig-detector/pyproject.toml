[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-92-s3-misconfig-detector"
version = "0.1.0"
description = "S3 Misconfiguration Detector — analyze S3 bucket policies for public exposure risks"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
s3-misconfig-detector = "project_92.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_92"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
