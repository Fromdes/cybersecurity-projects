[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-93-zero-trust-gateway"
version = "0.1.0"
description = "Zero Trust Network Gateway — policy-based access control with audit logging"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
zero-trust-gateway = "project_93.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_93"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
