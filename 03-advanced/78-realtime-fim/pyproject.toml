[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-78-realtime-fim"
version = "0.1.0"
description = "Real-Time File Integrity Monitor using inotify/watchdog"
requires-python = ">=3.11"
dependencies = ["click>=8.1", "watchdog>=3.0"]

[project.scripts]
realtime-fim = "project_78.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_78"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
