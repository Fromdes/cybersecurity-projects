[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-95-dlp-engine"
version = "0.1.0"
description = "DLP Engine — detect and redact sensitive data in files"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
dlp-engine = "project_95.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_95"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
