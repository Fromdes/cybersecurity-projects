[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-98-network-anomaly-detector"
version = "0.1.0"
description = "Network ML Anomaly Detector — statistical anomaly detection on network flows"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
network-anomaly-detector = "project_98.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_98"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
