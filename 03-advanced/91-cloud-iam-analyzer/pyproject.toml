[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-91-cloud-iam-analyzer"
version = "0.1.0"
description = "Cloud IAM Policy Analyzer — detect overpermissive AWS IAM policies"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
cloud-iam-analyzer = "project_91.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_91"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
