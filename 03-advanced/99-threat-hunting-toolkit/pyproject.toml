[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-99-threat-hunting-toolkit"
version = "0.1.0"
description = "Threat Hunting Toolkit — rule-based hunting across log files with IOC correlation"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
threat-hunting-toolkit = "project_99.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_99"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
