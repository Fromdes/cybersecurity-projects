[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-65-netflow-analyzer"
version = "0.1.0"
description = "NetFlow/IPFIX Analyzer"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
netflow-analyzer = "project_65.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_65"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
