[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "project_44"
version = "0.1.0"
description = "Input Sanitization Library — detect XSS, SQLi, path traversal, and command injection"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
]

[project.scripts]
input-sanitizer = "project_44.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]
