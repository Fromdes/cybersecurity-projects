[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "project_43"
version = "0.1.0"
description = "Rate Limiter — token bucket, sliding window, and fixed window algorithms"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
]

[project.scripts]
rate-limiter = "project_43.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]
