[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-74-phishing-url-ml"
version = "0.1.0"
description = "Phishing URL ML Detector"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.optional-dependencies]
ml = ["scikit-learn>=1.3"]

[project.scripts]
phishing-url-detector = "project_74.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_74"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
