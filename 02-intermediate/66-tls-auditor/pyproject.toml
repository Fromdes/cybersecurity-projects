[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-66-tls-auditor"
version = "0.1.0"
description = "TLS Configuration Auditor"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
tls-auditor = "project_66.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_66"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104"]
