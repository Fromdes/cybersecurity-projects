[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-49-secure-rest-api"
version = "0.1.0"
description = "Secure REST API Template"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "fastapi>=0.110",
    "pydantic>=2.0",
    "uvicorn[standard]>=0.29",
    "httpx>=0.27",
]

[project.scripts]
secure-api = "project_49.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_49"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101"]
