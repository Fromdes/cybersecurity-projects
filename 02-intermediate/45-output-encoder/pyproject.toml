[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "project_45"
version = "0.1.0"
description = "Output Encoder — context-aware encoding for HTML, JS, URL, CSS, JSON, and Shell"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
]

[project.scripts]
output-encoder = "project_45.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]
