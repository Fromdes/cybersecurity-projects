[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-56-ioc-matcher"
version = "0.1.0"
description = "IOC Matcher"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
ioc-matcher = "project_56.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_56"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101"]
