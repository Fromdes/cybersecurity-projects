[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-55-yara-orchestrator"
version = "0.1.0"
description = "YARA Rule Engine Orchestrator"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.optional-dependencies]
yara = ["yara-python>=4.3"]

[project.scripts]
yara-orchestrator = "project_55.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_55"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101"]
