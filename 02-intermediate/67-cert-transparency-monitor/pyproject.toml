[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "project-67-cert-transparency-monitor"
version = "0.1.0"
description = "Certificate Transparency Log Monitor"
requires-python = ">=3.11"
dependencies = ["click>=8.1"]

[project.scripts]
ct-monitor = "project_67.cli:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/project_67"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
[tool.ruff.lint]
select = ["E","F","W","B","I","N","UP","S","A","C4","SIM","RUF"]
ignore = ["S101","S104","S310"]
