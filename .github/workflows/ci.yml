name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: |
          for dir in 01-beginner/*/ 02-intermediate/*/ 03-advanced/*/; do
            if [ -d "${dir}src" ]; then
              echo "==> mypy ${dir}"
              mypy --strict "${dir}src"
            fi
          done

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Install project dependencies and run tests
        run: |
          for dir in 01-beginner/*/ 02-intermediate/*/ 03-advanced/*/; do
            if [ -d "${dir}tests" ]; then
              echo "==> pytest ${dir}"
              (cd "${dir}" && pip install -r requirements.txt -q && \
               python -m pytest --cov=src --cov-fail-under=80 -q)
            fi
          done

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-reports
          path: "**/coverage.xml"

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          for dir in 01-beginner/*/ 02-intermediate/*/ 03-advanced/*/; do
            if [ -d "${dir}src" ]; then
              echo "==> bandit ${dir}"
              bandit -r "${dir}src" -ll
            fi
          done
